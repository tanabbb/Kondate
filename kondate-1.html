<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="こんだて帳">
  <title>🍱 こんだて帳</title>
  <script>
    // 絵文字をCanvasでアイコン化
    (function() {
      const canvas = document.createElement('canvas');
      canvas.width = 192; canvas.height = 192;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#3D6B4F';
      ctx.beginPath();
      ctx.roundRect(0, 0, 192, 192, 40);
      ctx.fill();
      ctx.font = '120px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('🍱', 96, 100);
      const link = document.createElement('link');
      link.rel = 'icon'; link.href = canvas.toDataURL();
      document.head.appendChild(link);
      // ホーム画面用アイコン
      const apple = document.createElement('link');
      apple.rel = 'apple-touch-icon'; apple.href = canvas.toDataURL();
      document.head.appendChild(apple);
      // manifest for Android
      const manifest = {
        name: 'こんだて帳', short_name: 'こんだて帳',
        start_url: location.href,
        display: 'standalone',
        background_color: '#3D6B4F',
        theme_color: '#3D6B4F',
        icons: [{ src: canvas.toDataURL(), sizes: '192x192', type: 'image/png' }]
      };
      const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
      const mlink = document.createElement('link');
      mlink.rel = 'manifest'; mlink.href = URL.createObjectURL(blob);
      document.head.appendChild(mlink);
    })();
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif; background: #F7F3EE; color: #2D2D2D; }
    button { font-family: inherit; }
    textarea, input { font-family: inherit; }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// localStorage を使ったデータ保存（HTMLファイル単体用）
function loadStorage(key) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; }
}
function saveStorage(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
}

const WEEK_DAYS = ["日", "月", "火", "水", "木", "金", "土"];
const STICKY_COLORS = [
  { bg: "#FFF9C4", border: "#F9E04B", shadow: "#c8a800" },
  { bg: "#C8F7C5", border: "#58D68D", shadow: "#1a9150" },
  { bg: "#FFDCE0", border: "#F1948A", shadow: "#c0392b" },
  { bg: "#D6EAF8", border: "#7FB3D3", shadow: "#1a6fa8" },
  { bg: "#E8D5F5", border: "#C39BD3", shadow: "#7d3c98" },
  { bg: "#FAE5D3", border: "#F0A86F", shadow: "#ca6f1e" },
];
function getColor(idx) { return STICKY_COLORS[idx % STICKY_COLORS.length]; }

function getCurrentYearMonth() {
  const now = new Date();
  return { year: now.getFullYear(), month: now.getMonth() + 1 };
}
function daysInMonth(year, month) { return new Date(year, month, 0).getDate(); }
function firstDayOfWeek(year, month) { return new Date(year, month - 1, 1).getDay(); }
function dateKey(year, month, day) {
  return `${year}-${String(month).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
}
function isToday(year, month, day) {
  const n = new Date();
  return n.getFullYear()===year && n.getMonth()+1===month && n.getDate()===day;
}

function App() {
  const [tab, setTab] = useState("plan");
  const [recipes, setRecipes] = useState([]);
  const [plan, setPlan] = useState({});

  const init = getCurrentYearMonth();
  const [viewYear, setViewYear] = useState(init.year);
  const [viewMonth, setViewMonth] = useState(init.month);

  const [showRecipeModal, setShowRecipeModal] = useState(false);
  const [editingRecipe, setEditingRecipe] = useState(null);
  const [recipeName, setRecipeName] = useState("");
  const [recipeIngredients, setRecipeIngredients] = useState("");
  const [recipeMemo, setRecipeMemo] = useState("");

  const [selectedKey, setSelectedKey] = useState(null);
  const [showPicker, setShowPicker] = useState(false);
  const [pickerSearch, setPickerSearch] = useState("");

  // 初期ロード（同期）
  useEffect(() => {
    const r = loadStorage("kondate-recipes");
    const p = loadStorage("kondate-plan");
    if (r) setRecipes(r);
    if (p) setPlan(p);
  }, []);

  useEffect(() => { saveStorage("kondate-recipes", recipes); }, [recipes]);
  useEffect(() => { saveStorage("kondate-plan", plan); }, [plan]);

  function openAddRecipe() {
    setEditingRecipe(null); setRecipeName(""); setRecipeIngredients(""); setRecipeMemo("");
    setShowRecipeModal(true);
  }
  function openEditRecipe(r) {
    setEditingRecipe(r); setRecipeName(r.name);
    setRecipeIngredients(r.ingredients.join("、")); setRecipeMemo(r.memo || "");
    setShowRecipeModal(true);
  }
  function saveRecipe() {
    if (!recipeName.trim()) return;
    const ingredients = recipeIngredients.split(/[、,，\n]/).map(s => s.trim()).filter(Boolean);
    if (editingRecipe) {
      setRecipes(prev => prev.map(r => r.id === editingRecipe.id ? { ...r, name: recipeName.trim(), ingredients, memo: recipeMemo } : r));
    } else {
      setRecipes(prev => [...prev, { id: Date.now(), name: recipeName.trim(), ingredients, memo: recipeMemo, colorIdx: prev.length }]);
    }
    setShowRecipeModal(false);
  }
  function deleteRecipe(id) {
    if (!window.confirm("このレシピを削除しますか？")) return;
    setRecipes(prev => prev.filter(r => r.id !== id));
    setPlan(prev => {
      const next = { ...prev };
      Object.keys(next).forEach(k => { if (next[k]?.id === id) next[k] = null; });
      return next;
    });
  }

  function openPicker(key) { setSelectedKey(key); setPickerSearch(""); setShowPicker(true); }
  function assignRecipe(recipe) {
    setPlan(prev => ({ ...prev, [selectedKey]: recipe }));
    setShowPicker(false);
  }
  function clearCell(key, e) {
    e.stopPropagation();
    setPlan(prev => ({ ...prev, [key]: null }));
  }

  function prevMonth() {
    if (viewMonth === 1) { setViewYear(y => y-1); setViewMonth(12); }
    else setViewMonth(m => m-1);
  }
  function nextMonth() {
    if (viewMonth === 12) { setViewYear(y => y+1); setViewMonth(1); }
    else setViewMonth(m => m+1);
  }
  function goToday() { const t = getCurrentYearMonth(); setViewYear(t.year); setViewMonth(t.month); }

  const totalDays = daysInMonth(viewYear, viewMonth);
  const startDow = firstDayOfWeek(viewYear, viewMonth);
  const weeks = [];
  let week = Array(startDow).fill(null);
  for (let d = 1; d <= totalDays; d++) {
    week.push(d);
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length > 0) { while (week.length < 7) week.push(null); weeks.push(week); }

  const shoppingMap = {};
  for (let d = 1; d <= totalDays; d++) {
    const k = dateKey(viewYear, viewMonth, d);
    const recipe = plan[k];
    if (!recipe) continue;
    recipe.ingredients.forEach(ing => {
      if (!shoppingMap[ing]) shoppingMap[ing] = [];
      shoppingMap[ing].push(`${viewMonth}/${d}`);
    });
  }
  const shoppingList = Object.entries(shoppingMap).map(([ing, uses]) => ({ ing, uses }));
  const filteredRecipes = recipes.filter(r => r.name.includes(pickerSearch));

  function keyToLabel(key) {
    if (!key) return "";
    const [, m, d] = key.split("-");
    const dow = WEEK_DAYS[new Date(viewYear, Number(m)-1, Number(d)).getDay()];
    return `${Number(m)}月${Number(d)}日（${dow}）の夕食`;
  }

  const tabStyle = (key) => ({
    flex:1, padding:"12px 0", fontSize:13, fontWeight:tab===key?700:400,
    background:"none", border:"none",
    borderBottom: tab===key ? "3px solid #3D6B4F" : "3px solid transparent",
    color: tab===key ? "#3D6B4F" : "#888", cursor:"pointer",
  });

  return (
    <div style={{ minHeight:"100vh", background:"#F7F3EE" }}>
      {/* ヘッダー */}
      <header style={{ background:"#3D6B4F", padding:"14px 20px", boxShadow:"0 2px 8px rgba(61,107,79,0.3)" }}>
        <div style={{ fontSize:21, fontWeight:800, color:"#fff", letterSpacing:2 }}>🍱 こんだて帳</div>
        <div style={{ fontSize:11, color:"#A8D5B5", marginTop:2 }}>夕食の献立を1ヶ月まるごと管理</div>
      </header>

      {/* タブ */}
      <nav style={{ background:"#fff", display:"flex", borderBottom:"2px solid #E8E2DA", position:"sticky", top:0, zIndex:10 }}>
        <button onClick={()=>setTab("plan")} style={tabStyle("plan")}>📅 献立表</button>
        <button onClick={()=>setTab("recipes")} style={tabStyle("recipes")}>📝 レシピ帳</button>
        <button onClick={()=>setTab("shopping")} style={tabStyle("shopping")}>🛒 買い物リスト</button>
      </nav>

      <main style={{ padding:"12px 10px", maxWidth:860, margin:"0 auto" }}>

        {/* 献立表 */}
        {tab === "plan" && (
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
              <button onClick={prevMonth} style={{ background:"none", border:"1.5px solid #D5CBBF", borderRadius:8, padding:"6px 16px", cursor:"pointer", color:"#3D6B4F", fontSize:18 }}>‹</button>
              <div style={{ textAlign:"center" }}>
                <div style={{ fontSize:17, fontWeight:800, color:"#3D6B4F" }}>{viewYear}年{viewMonth}月</div>
                <button onClick={goToday} style={{ fontSize:11, color:"#aaa", background:"none", border:"none", cursor:"pointer", marginTop:2 }}>今月に戻る</button>
              </div>
              <button onClick={nextMonth} style={{ background:"none", border:"1.5px solid #D5CBBF", borderRadius:8, padding:"6px 16px", cursor:"pointer", color:"#3D6B4F", fontSize:18 }}>›</button>
            </div>
            <div style={{ overflowX:"auto" }}>
              <table style={{ width:"100%", borderCollapse:"separate", borderSpacing:"4px 4px", minWidth:320 }}>
                <thead>
                  <tr>
                    {WEEK_DAYS.map(d => (
                      <th key={d} style={{
                        textAlign:"center", fontSize:12, fontWeight:700, paddingBottom:6,
                        color: d==="日"?"#c0392b" : d==="土"?"#2980b9" : "#3D6B4F",
                      }}>{d}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {weeks.map((wk, wi) => (
                    <tr key={wi}>
                      {wk.map((day, di) => {
                        if (!day) return <td key={di}></td>;
                        const key = dateKey(viewYear, viewMonth, day);
                        const recipe = plan[key];
                        const color = recipe ? getColor(recipe.colorIdx) : null;
                        const today = isToday(viewYear, viewMonth, day);
                        const isSun = di===0, isSat = di===6;
                        return (
                          <td key={di} onClick={()=>openPicker(key)} style={{ verticalAlign:"top", cursor:"pointer" }}>
                            <div style={{
                              minHeight:72, borderRadius:8,
                              background: recipe ? color.bg : today ? "#EAF4EE" : "#fff",
                              border: today ? "2px solid #3D6B4F" : recipe ? `1.5px solid ${color.border}` : "1.5px solid #E8E2DA",
                              boxShadow: recipe ? `2px 3px 0 ${color.shadow}33` : "0 1px 2px rgba(0,0,0,0.04)",
                              padding:"4px 5px", position:"relative",
                            }}>
                              <div style={{
                                fontSize:11, fontWeight:today?800:600,
                                color: isSun?"#c0392b" : isSat?"#2980b9" : today?"#3D6B4F" : "#555",
                                marginBottom:3,
                              }}>{day}</div>
                              {recipe ? (
                                <>
                                  <div style={{ fontSize:10, fontWeight:700, lineHeight:1.3, color:"#2D2D2D" }}>{recipe.name}</div>
                                  {recipe.ingredients.length > 0 && (
                                    <div style={{ fontSize:8, color:"#666", marginTop:2, lineHeight:1.4 }}>
                                      {recipe.ingredients.slice(0,2).join("・")}{recipe.ingredients.length>2?"…":""}
                                    </div>
                                  )}
                                  <button onClick={e=>clearCell(key,e)} style={{
                                    position:"absolute", top:2, right:3,
                                    background:"none", border:"none", fontSize:11,
                                    cursor:"pointer", color:"#bbb", lineHeight:1, padding:0,
                                  }}>×</button>
                                </>
                              ) : (
                                <div style={{ fontSize:16, color:"#DDD", textAlign:"center", paddingTop:6 }}>＋</div>
                              )}
                            </div>
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            <p style={{ fontSize:11, color:"#bbb", textAlign:"center", marginTop:10 }}>日付をタップして夕食レシピの付箋を貼り付けよう</p>
          </div>
        )}

        {/* レシピ帳 */}
        {tab === "recipes" && (
          <div>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
              <p style={{ fontSize:12, color:"#999" }}>{recipes.length}件のレシピ</p>
              <button onClick={openAddRecipe} style={{
                background:"#3D6B4F", color:"#fff", border:"none", borderRadius:20,
                padding:"8px 18px", fontSize:13, fontWeight:700, cursor:"pointer",
              }}>＋ レシピを追加</button>
            </div>
            {recipes.length === 0 ? (
              <div style={{ textAlign:"center", padding:60, color:"#BBB" }}>
                <div style={{ fontSize:48 }}>🍽️</div>
                <div style={{ marginTop:12, fontSize:14 }}>まだレシピがありません</div>
                <div style={{ fontSize:12, marginTop:4 }}>「＋ レシピを追加」から登録してみましょう</div>
              </div>
            ) : (
              <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(160px, 1fr))", gap:12 }}>
                {recipes.map(r => {
                  const c = getColor(r.colorIdx);
                  return (
                    <div key={r.id} style={{ background:c.bg, border:`1.5px solid ${c.border}`, borderRadius:10, padding:14, boxShadow:`3px 4px 0 ${c.shadow}44` }}>
                      <div style={{ fontSize:14, fontWeight:800, marginBottom:6 }}>{r.name}</div>
                      {r.ingredients.length > 0 && (
                        <div style={{ fontSize:11, color:"#555", marginBottom:6, lineHeight:1.7 }}>
                          {r.ingredients.map((ing,i) => (
                            <span key={i} style={{ display:"inline-block", background:"rgba(255,255,255,0.65)", borderRadius:10, padding:"1px 6px", marginRight:3, marginBottom:3 }}>{ing}</span>
                          ))}
                        </div>
                      )}
                      {r.memo && <div style={{ fontSize:10, color:"#888", fontStyle:"italic", marginBottom:8 }}>{r.memo}</div>}
                      <div style={{ display:"flex", gap:6, marginTop:6 }}>
                        <button onClick={()=>openEditRecipe(r)} style={{ flex:1, fontSize:11, padding:"5px 0", border:`1px solid ${c.border}`, background:"rgba(255,255,255,0.7)", borderRadius:6, cursor:"pointer", fontWeight:600 }}>編集</button>
                        <button onClick={()=>deleteRecipe(r.id)} style={{ flex:1, fontSize:11, padding:"5px 0", border:"1px solid #f5a5a5", background:"rgba(255,200,200,0.5)", borderRadius:6, cursor:"pointer", fontWeight:600, color:"#c0392b" }}>削除</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}

        {/* 買い物リスト */}
        {tab === "shopping" && (
          <div>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
              <div style={{ fontSize:14, fontWeight:700, color:"#3D6B4F" }}>{viewYear}年{viewMonth}月の材料</div>
              <div style={{ display:"flex", gap:8 }}>
                <button onClick={prevMonth} style={{ background:"none", border:"1.5px solid #D5CBBF", borderRadius:6, padding:"4px 10px", cursor:"pointer", color:"#3D6B4F" }}>‹</button>
                <button onClick={nextMonth} style={{ background:"none", border:"1.5px solid #D5CBBF", borderRadius:6, padding:"4px 10px", cursor:"pointer", color:"#3D6B4F" }}>›</button>
              </div>
            </div>
            {shoppingList.length === 0 ? (
              <div style={{ textAlign:"center", padding:60, color:"#BBB" }}>
                <div style={{ fontSize:48 }}>🛒</div>
                <div style={{ marginTop:12, fontSize:14 }}>この月の献立を組むと材料が表示されます</div>
              </div>
            ) : (
              <>
                <p style={{ fontSize:12, color:"#999", marginBottom:14 }}>献立から自動集計 — {shoppingList.length}種類の食材</p>
                <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill, minmax(150px, 1fr))", gap:10 }}>
                  {shoppingList.map(({ ing, uses }) => (
                    <div key={ing} style={{ background:"#fff", border:"1.5px solid #E8E2DA", borderRadius:10, padding:"10px 12px", boxShadow:"0 1px 4px rgba(0,0,0,0.06)" }}>
                      <div style={{ fontSize:13, fontWeight:700, marginBottom:5 }}>🥦 {ing}</div>
                      <div style={{ fontSize:10, color:"#aaa", lineHeight:1.8 }}>
                        {uses.map((u,i) => (
                          <span key={i} style={{ display:"inline-block", background:"#F0EBE3", borderRadius:8, padding:"1px 5px", marginRight:3, marginBottom:2 }}>{u}</span>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}
      </main>

      {/* レシピ追加/編集モーダル */}
      {showRecipeModal && (
        <div onClick={()=>setShowRecipeModal(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:24, width:"100%", maxWidth:500, maxHeight:"85vh", overflowY:"auto" }}>
            <h2 style={{ fontSize:17, fontWeight:800, marginBottom:20, color:"#3D6B4F" }}>{editingRecipe?"レシピを編集":"レシピを追加"}</h2>
            <label style={{ fontSize:12, color:"#888", fontWeight:600, display:"block", marginBottom:4 }}>料理名 *</label>
            <input value={recipeName} onChange={e=>setRecipeName(e.target.value)} placeholder="例：豚の生姜焼き"
              style={{ display:"block", width:"100%", padding:"10px 12px", marginBottom:14, border:"1.5px solid #D5CBBF", borderRadius:8, fontSize:15, background:"#FDFAF7" }} />
            <label style={{ fontSize:12, color:"#888", fontWeight:600, display:"block", marginBottom:4 }}>材料（任意・「、」か改行で区切る）</label>
            <textarea value={recipeIngredients} onChange={e=>setRecipeIngredients(e.target.value)} placeholder="例：豚ロース、玉ねぎ、生姜、醤油、みりん" rows={3}
              style={{ display:"block", width:"100%", padding:"10px 12px", marginBottom:14, border:"1.5px solid #D5CBBF", borderRadius:8, fontSize:14, background:"#FDFAF7", resize:"vertical" }} />
            <label style={{ fontSize:12, color:"#888", fontWeight:600, display:"block", marginBottom:4 }}>メモ（任意）</label>
            <textarea value={recipeMemo} onChange={e=>setRecipeMemo(e.target.value)} placeholder="例：夫が好きな定番メニュー" rows={2}
              style={{ display:"block", width:"100%", padding:"10px 12px", marginBottom:20, border:"1.5px solid #D5CBBF", borderRadius:8, fontSize:14, background:"#FDFAF7", resize:"vertical" }} />
            <div style={{ display:"flex", gap:10 }}>
              <button onClick={()=>setShowRecipeModal(false)} style={{ flex:1, padding:"12px 0", border:"1.5px solid #D5CBBF", borderRadius:10, background:"#fff", fontSize:14, cursor:"pointer", color:"#888" }}>キャンセル</button>
              <button onClick={saveRecipe} style={{ flex:2, padding:"12px 0", border:"none", borderRadius:10, background:recipeName.trim()?"#3D6B4F":"#ccc", color:"#fff", fontSize:14, fontWeight:700, cursor:"pointer" }}>保存する</button>
            </div>
          </div>
        </div>
      )}

      {/* レシピピッカー */}
      {showPicker && (
        <div onClick={()=>setShowPicker(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", display:"flex", alignItems:"flex-end", justifyContent:"center", zIndex:100 }}>
          <div onClick={e=>e.stopPropagation()} style={{ background:"#fff", borderRadius:"20px 20px 0 0", padding:20, width:"100%", maxWidth:500, maxHeight:"75vh", overflowY:"auto" }}>
            <h3 style={{ fontSize:15, fontWeight:800, marginBottom:4, color:"#3D6B4F" }}>夕食に貼るレシピを選ぶ</h3>
            <p style={{ fontSize:12, color:"#aaa", marginBottom:12 }}>{keyToLabel(selectedKey)}</p>
            <input value={pickerSearch} onChange={e=>setPickerSearch(e.target.value)} placeholder="レシピ名で絞り込み"
              style={{ width:"100%", padding:"9px 12px", border:"1.5px solid #D5CBBF", borderRadius:20, fontSize:13, marginBottom:12, background:"#FDFAF7" }} />
            {filteredRecipes.length === 0 ? (
              <div style={{ textAlign:"center", padding:"30px 0", color:"#BBB", fontSize:13 }}>
                {recipes.length===0 ? "先にレシピを登録してください" : "該当するレシピがありません"}
              </div>
            ) : (
              <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
                {filteredRecipes.map(r => {
                  const c = getColor(r.colorIdx);
                  return (
                    <button key={r.id} onClick={()=>assignRecipe(r)} style={{ background:c.bg, border:`1.5px solid ${c.border}`, borderRadius:10, padding:"10px 14px", textAlign:"left", cursor:"pointer", boxShadow:`2px 2px 0 ${c.shadow}44` }}>
                      <div style={{ fontSize:14, fontWeight:700 }}>{r.name}</div>
                      {r.ingredients.length>0 && (
                        <div style={{ fontSize:11, color:"#666", marginTop:3 }}>
                          {r.ingredients.slice(0,4).join("・")}{r.ingredients.length>4?"…":""}
                        </div>
                      )}
                    </button>
                  );
                })}
              </div>
            )}
            <button onClick={()=>setShowPicker(false)} style={{ width:"100%", marginTop:14, padding:"11px 0", border:"1.5px solid #D5CBBF", borderRadius:10, background:"#fff", fontSize:14, cursor:"pointer", color:"#888" }}>閉じる</button>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
